<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- ticket body -->
  <rect x="1" y="6" width="30" height="20" fill="#2b45ff"/>
  <!-- dashed yellow border -->
  <rect x="1" y="6" width="30" height="20" fill="none" stroke="#ffe600" stroke-width="1.5" stroke-dasharray="2,1.5"/>
  <!-- left notch -->
  <circle cx="1" cy="16" r="3.5" fill="#04020a"/>
  <!-- right notch -->
  <circle cx="31" cy="16" r="3.5" fill="#04020a"/>
  <!-- GREG text -->
  <text x="16" y="20.5" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="9.5" font-weight="bold"
        fill="#ffe600" letter-spacing="1.2">GREG</text>
</svg>
